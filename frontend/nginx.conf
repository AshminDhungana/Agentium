limit_req_zone  $binary_remote_addr  zone=api_limit:10m   rate=30r/s;
limit_req_zone  $binary_remote_addr  zone=auth_limit:2m   rate=2r/s;
limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Handle React Router
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Swagger UI
    location /docs {
        proxy_pass http://agentium-backend:8000/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # OpenAPI schema
    location /openapi.json {
        proxy_pass http://agentium-backend:8000/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ReDoc
    location /redoc {
        proxy_pass http://agentium-backend:8000/redoc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Sovereign WebSocket — must be declared BEFORE the /api/ block so nginx
    # matches it with higher specificity. The /api/ block below has no Upgrade
    # headers and would silently downgrade this to plain HTTP, closing the socket.
    location /api/v1/sovereign/ws {
        proxy_pass http://agentium-backend:8000/api/v1/sovereign/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Phase 17.1 — Auth endpoint gate (tightest limits) ────────────────────
    # Declared BEFORE /api/ so Nginx matches the more-specific prefix first.
    # 2 req/s sustained with a burst of 5: allows ~7 login attempts before the
    # gate slams shut.  Small auth bodies → 64 KB ceiling is generous.
    location /api/v1/auth/ {
        limit_req        zone=auth_limit burst=5 nodelay;
        limit_conn       conn_limit 5;
        limit_req_status 429;

        client_max_body_size 64k;

        proxy_pass             http://agentium-backend:8000/api/v1/auth/;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
    }

    # ── Phase 17.1 — General API (first line of defence before FastAPI) ───────
    # 30 req/s sustained; burst=100 nodelay absorbs short legitimate spikes
    # (e.g. page load firing 8 parallel requests) without queuing them.
    # limit_conn 10: prevents a single IP from holding >10 concurrent TCP
    # connections, which is the classic Slowloris attack vector.
    # client_max_body_size 26m: 1 MB above Python's 25 MB ceiling so Nginx
    # never rejects a valid file upload before FastAPI can respond gracefully.
    location /api/ {
        limit_req        zone=api_limit burst=100 nodelay;
        limit_conn       conn_limit 10;
        limit_req_status 429;
        limit_conn_status 429;

        client_max_body_size 26m;

        proxy_pass             http://agentium-backend:8000/api/;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        # Genesis init and agent operations can exceed nginx's default 60s.
        proxy_connect_timeout  60s;
        proxy_send_timeout     300s;
        proxy_read_timeout     300s;
        # Retry on connection failures — absorbs transient 502s during restart.
        proxy_next_upstream        error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries  3;
        proxy_next_upstream_timeout 30s;
    }

    # Proxy WebSocket
    location /ws/ {
        proxy_pass http://agentium-backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}