name: Integration Tests

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]
  workflow_dispatch:
    inputs:
      staging_url:
        description: 'Staging URL for full load test'
        required: false
        default: 'http://localhost:8000'

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start test services
        run: |
          docker compose -f docker-compose.test.yml up -d

      - name: Wait for services to be healthy
        run: |
          echo "=== Service startup logs ==="
          docker compose -f docker-compose.test.yml logs
          echo "=== Waiting for healthy services ==="
          for i in {1..60}; do
            sleep 2
            healthy_count=$(docker compose -f docker-compose.test.yml ps | grep -ci "healthy" || true)
            if [ "$healthy_count" -eq 3 ]; then
              echo "All 3 services healthy."
              break
            fi
            echo "Waiting for services ($healthy_count/3 healthy) — attempt $i/60"
          done
          echo "=== Final service status ==="
          docker compose -f docker-compose.test.yml ps
          # Verify PostgreSQL is accepting connections from the host
          pg_isready -h localhost -p 5432 -U agentium || echo "WARNING: pg_isready failed"

      - name: Initialize test databases
        run: |
          # Use the container's actual POSTGRES_USER (fallback to agentium)
          PSQL_USER="$(docker compose -f docker-compose.test.yml exec -T postgres bash -lc 'echo "${POSTGRES_USER:-agentium}"' | tr -d '\r')"
          echo "Using DB user: $PSQL_USER"

          # Wait until Postgres is accepting connections
          for i in {1..30}; do
            if docker compose -f docker-compose.test.yml exec -T postgres bash -lc "pg_isready -U '$PSQL_USER'" >/dev/null 2>&1; then
              echo "Postgres is ready."
              break
            fi
            echo "Waiting for Postgres to be ready ($i/30)..."
            sleep 1
          done

          # Create databases idempotently (fail the build if this breaks)
          for db in agentium agentium_test; do
            echo "Ensuring database exists: $db"
            docker compose -f docker-compose.test.yml exec -T postgres \
              psql -U "$PSQL_USER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='$db'" | grep -q 1 || \
              docker compose -f docker-compose.test.yml exec -T postgres \
                psql -U "$PSQL_USER" -d postgres -c "CREATE DATABASE $db"
          done

          # Verify databases exist
          echo "=== Verifying databases ==="
          docker compose -f docker-compose.test.yml exec -T postgres \
            psql -U "$PSQL_USER" -d postgres -c "\l" | grep -E "agentium|agentium_test"
        shell: bash

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --no-cache-dir -r requirements.txt

      - name: Run integration tests with coverage
        working-directory: ./backend
        run: pytest
        env:
          DATABASE_URL: postgresql://agentium:agentium@localhost:5432/agentium_test
          REDIS_URL: redis://localhost:6379/1
          CHROMA_HOST: localhost
          CHROMA_PORT: 8001
          CELERY_TASK_ALWAYS_EAGER: true
          TESTING: true
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/htmlcov/

      - name: Stop test services
        if: always()
        run: docker compose -f docker-compose.test.yml down

  # ───────────────────────────────────────────────────────────────
  # Phase 18.2 - Performance Regression Gate
  # ───────────────────────────────────────────────────────────────
  performance-tests:
    needs: integration-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --no-cache-dir -r requirements.txt

      - name: Install performance testing tools
        run: |
          pip install locust>=2.29 pytest-benchmark>=4.0 py-cpuinfo>=9.0

      - name: Start test infrastructure
        run: docker compose -f docker-compose.test.yml up -d

      - name: Run ChromaDB benchmark
        working-directory: ./backend
        run: |
          DATABASE_URL=postgresql://agentium:agentium@localhost:5432/agentium_test \
          REDIS_URL=redis://localhost:6379/1 \
          CHROMA_HOST=localhost \
          CHROMA_PORT=8001 \
          TESTING=true \
          PYTHONPATH=${{ github.workspace }} \
          pytest tests/benchmarks/test_chroma_query.py -m benchmark --benchmark-only --benchmark-save=baseline

      - name: Upload benchmark baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline
          path: backend/benchmarks/baseline/

      - name: Run load test (scaled-down for CI)
        working-directory: ./backend
        run: |
          cd tests/load && \
          locust \
            --host ${{ github.event.inputs.staging_url || 'http://localhost:8000' }} \
            --users 100 \
            --spawn-rate 10 \
            --run-time 2m \
            --headless \
            --html locust_report.html
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload Locust report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-report
          path: backend/tests/load/locust_report.html

      - name: Tear down test infrastructure
        if: always()
        run: docker compose -f docker-compose.test.yml down
