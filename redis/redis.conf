# Redis configuration for Agentium
#
# Redis is used here as the Celery broker/result backend, the inter-service
# message bus, and for transient rate-limit / counter state. PostgreSQL is the
# system's source of truth (agents, votes, conversations, constitution), so
# Redis data is largely ephemeral and safe to lose on a hard crash.
#
# Tradeoff (decided 2026-07-18):
#   appendfsync everysec (default) lets a background thread fsync the AOF once
#   per second. Under load on a slow backing disk this emits the
#   "Asynchronous AOF fsync is taking too long" warning and adds write latency.
#   appendfsync no defers flushing entirely to the OS, eliminating that warning
#   and maximizing throughput. Accepted risk: on a hard crash we can lose the
#   last OS-buffered writes (in-flight Celery tasks, transient counters). Tasks
#   re-run and Postgres remains authoritative, so this is acceptable here.

appendonly yes
appendfsync no
# Avoid blocking on fsync during AOF rewrites (relevant with appendfsync no,
# but keeps rewrites non-blocking regardless).
no-appendfsync-on-rewrite yes
