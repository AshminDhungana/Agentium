# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Ephemeral Test Infrastructure
# PostgreSQL + Redis + ChromaDB — no persistent volumes
# Used by CI (GitHub Actions) and local integration test runs.
# ── Services ─────────────────────────────────
#   postgres :5432  ─  test DB (agentium_test)
#   redis    :6379  ─  Celery broker / cache
#   chromadb :8001  ─  vector store (host:container = 8001:8000)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

services:
  postgres:
    image: postgres:15-alpine
    container_name: agentium-test-postgres
    environment:
      POSTGRES_DB: agentium_test
      POSTGRES_USER: agentium
      POSTGRES_PASSWORD: agentium
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c log_min_duration_statement=500
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentium"]
      interval: 5s
      timeout: 5s
      retries: 5
    # No volumes — ephemeral

  redis:
    image: redis:7.2.1-alpine
    container_name: agentium-test-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    # No volumes — ephemeral

  chromadb:
    image: chromadb/chroma:1.5.1
    container_name: agentium-test-chroma
    ports:
      - "8001:8000"
    healthcheck:
      # Readiness check via bash's /dev/tcp. The chromadb/chroma image ships as
      # a standalone ELF binary with NO python/curl/wget in PATH, so the previous
      # `python -c` check exited 127 on every probe and chroma never reported
      # healthy. Chroma only binds :8000 once it is ready to serve, so a
      # successful TCP connect is a valid readiness signal.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8000 && exec 3>&-"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    # No volumes — ephemeral
