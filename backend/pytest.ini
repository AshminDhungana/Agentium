[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts = --cov=services --cov-report=term-missing --cov-report=html --cov-fail-under=20
markers =
    integration: marks tests as integration (require running services)
    slow: marks tests that take > 10s
env =
    D:DATABASE_URL=postgresql://agentium:agentium@postgres:5432/agentium_test
    D:REDIS_URL=redis://redis:6379/1
    D:CHROMA_HOST=chromadb
    D:CHROMA_PORT=8000
    D:CELERY_TASK_ALWAYS_EAGER=true